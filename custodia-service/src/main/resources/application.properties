# define a porta livre (8082) para evitar o conflito com o conta-service (8081)
server.port=8082

spring.application.name=custodia-service

# o custodia precisa plugar no MESMO RabbitMQ para ouvir a fila
spring.rabbitmq.host=127.0.0.1
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest